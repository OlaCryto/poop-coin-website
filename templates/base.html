<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- This is the most important tag for responsiveness -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="$POOP: The ultimate shitcoin on AVAX. Flush your FUD and join the dump!">
    <meta name="keywords" content="POOP, AVAX, meme coin, shitcoin, blockchain">
    <title>{% block title %}$POOP on AVAX{% endblock %}</title>
    
    <!-- This is the new circular SVG favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2250%22 fill=%22%238B4513%22/><text x=%2250%22 y=%2258%22 font-size=%2280%22 text-anchor=%22middle%22>💩</text></svg>">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.ethers.io/lib/ethers-5.7.umd.min.js" defer></script>
</head>
<body class="relative">

    <audio id="bg-music" loop src="https://www.soundjay.com/toilet-flush-4.mp3" preload="auto"></audio>
    
    <!-- Navigation bar -->
    <nav class="bg-black bg-opacity-50 text-white p-4 sticky top-0 z-20">
        <div class="container mx-auto flex items-center justify-between">
            <!-- Logo -->
            <a href="{{ url_for('home') }}" class="text-3xl font-bold">💩 $POOP</a>

            <!-- Desktop Nav -->
            <div class="hidden md:flex items-center space-x-2 text-lg">
                <a href="{{ url_for('home') }}" class="px-3 py-2 rounded-full hover:bg-yellow-500 hover:text-black transition">Home</a>
                <a href="{{ url_for('about') }}" class="px-3 py-2 rounded-full hover:bg-yellow-500 hover:text-black transition">About</a>
                <a href="{{ url_for('tokenomics') }}" class="px-3 py-2 rounded-full hover:bg-yellow-500 hover:text-black transition">Tokenomics</a>
                <a href="{{ url_for('how_to_buy') }}" class="px-3 py-2 rounded-full hover:bg-yellow-500 hover:text-black transition">How to Buy</a>
                <a href="{{ url_for('launch') }}" class="px-3 py-2 rounded-full hover:bg-yellow-500 hover:text-black transition">Launch</a>
                <a href="{{ url_for('community') }}" class="px-3 py-2 rounded-full hover:bg-yellow-500 hover:text-black transition">Community</a>
                <a href="{{ url_for('whitelist') }}" class="px-3 py-2 rounded-full hover:bg-yellow-500 hover:text-black transition">Whitelist</a>
                <a href="{{ url_for('memes') }}" class="px-3 py-2 rounded-full hover:bg-yellow-500 hover:text-black transition">Meme Gallery</a>
                <button id="music-control" class="bg-yellow-500 text-black px-3 py-2 rounded-full hover:scale-105 transition">Mute Music 🔇</button>
            </div>

            <!-- Mobile Hamburger Button -->
            <div class="md:hidden">
                <button id="mobile-menu-button" class="text-white focus:outline-none">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                    </svg>
                </button>
            </div>
        </div>

        <!-- Mobile Menu Panel -->
        <div id="mobile-menu" class="hidden md:hidden px-4 pt-3 pb-4 space-y-2 text-base">
            <a href="{{ url_for('home') }}" class="block px-3 py-2 rounded hover:bg-yellow-500 hover:text-black">Home</a>
            <a href="{{ url_for('about') }}" class="block px-3 py-2 rounded hover:bg-yellow-500 hover:text-black">About</a>
            <a href="{{ url_for('tokenomics') }}" class="block px-3 py-2 rounded hover:bg-yellow-500 hover:text-black">Tokenomics</a>
            <a href="{{ url_for('how_to_buy') }}" class="block px-3 py-2 rounded hover:bg-yellow-500 hover:text-black">How to Buy</a>
            <a href="{{ url_for('launch') }}" class="block px-3 py-2 rounded hover:bg-yellow-500 hover:text-black">Launch</a>
            <a href="{{ url_for('community') }}" class="block px-3 py-2 rounded hover:bg-yellow-500 hover:text-black">Community</a>
            <a href="{{ url_for('whitelist') }}" class="block px-3 py-2 rounded hover:bg-yellow-500 hover:text-black">Whitelist</a>
            <a href="{{ url_for('memes') }}" class="block px-3 py-2 rounded hover:bg-yellow-500 hover:text-black">Meme Gallery</a>
            <button id="music-control-mobile" class="w-full bg-yellow-500 text-black py-2 rounded hover:scale-105">Mute Music 🔇</button>
        </div>
    </nav>

    <main class="fade-in">
        {% block content %}{% endblock %}
    </main>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>

    <!-- Mobile Menu Toggle Logic -->
    <script>
        (function () {
            function initMobileMenu() {
                const menuButton = document.getElementById('mobile-menu-button');
                const mobileMenu = document.getElementById('mobile-menu');
                const musicBtnMobile = document.getElementById('music-control-mobile');
                const bgMusic = document.getElementById('bg-music');

                if (menuButton && mobileMenu) {
                    menuButton.addEventListener('click', () => {
                        mobileMenu.classList.toggle('hidden');
                    });
                }

                if (musicBtnMobile && bgMusic) {
                    musicBtnMobile.addEventListener('click', () => {
                        if (bgMusic.paused) {
                            bgMusic.play();
                            musicBtnMobile.textContent = 'Mute Music 🔇';
                        } else {
                            bgMusic.pause();
                            musicBtnMobile.textContent = 'Play Music 🔊';
                        }
                    });
                }
            }

            if (document.readyState !== 'loading') {
                initMobileMenu();
            } else {
                document.addEventListener('DOMContentLoaded', initMobileMenu);
            }
        })();
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>
