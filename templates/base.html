<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- This is the most important tag for responsiveness -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="$POOP: The ultimate shitcoin on AVAX. Flush your FUD and join the dump!">
    <meta name="keywords" content="POOP, AVAX, meme coin, shitcoin, blockchain">
    <title>{% block title %}$POOP on AVAX{% endblock %}</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.ethers.io/lib/ethers-5.7.umd.min.js" defer></script>
</head>
<body class="relative">
    
    <audio id="bg-music" loop src="https://www.soundjay.com/toilet-flush-4.mp3" preload="auto"></audio>
    <button id="music-control" class="fixed top-4 right-4 bg-yellow-500 text-black px-4 py-2 rounded-full z-30 hover:scale-105">Mute Music 🔇</button>
    
    <!-- Main navigation bar -->
    <nav class="bg-black bg-opacity-50 text-white p-4 sticky top-0 z-20">
        <div class="container mx-auto flex items-center justify-between">
            <a href="{{ url_for('home') }}" class="text-3xl">💩 $POOP</a>
            
            <!-- Desktop Menu (hidden on screens smaller than md) -->
            <div class="hidden md:flex items-center space-x-4 text-lg">
                <a href="{{ url_for('home') }}" class="px-3 py-2 rounded-full hover:bg-yellow-500 hover:text-black transition-colors">Home</a>
                <a href="{{ url_for('about') }}" class="px-3 py-2 rounded-full hover:bg-yellow-500 hover:text-black transition-colors">About</a>
                <a href="{{ url_for('tokenomics') }}" class="px-3 py-2 rounded-full hover:bg-yellow-500 hover:text-black transition-colors">Tokenomics</a>
                <a href="{{ url_for('how_to_buy') }}" class="px-3 py-2 rounded-full hover:bg-yellow-500 hover:text-black transition-colors">How to Buy</a>
                <a href="{{ url_for('launch') }}" class="px-3 py-2 rounded-full hover:bg-yellow-500 hover:text-black transition-colors">Launch</a>
                <a href="{{ url_for('community') }}" class="px-3 py-2 rounded-full hover:bg-yellow-500 hover:text-black transition-colors">Community</a>
                <a href="{{ url_for('whitelist') }}" class="px-3 py-2 rounded-full hover:bg-yellow-500 hover:text-black transition-colors">Whitelist</a>
                <a href="{{ url_for('memes') }}" class="px-3 py-2 rounded-full hover:bg-yellow-500 hover:text-black transition-colors">Meme Gallery</a>
            </div>

            <!-- Mobile Menu Button (only visible on screens smaller than md) -->
            <div class="md:hidden">
                <button id="mobile-menu-button" class="text-white focus:outline-none">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Mobile Menu (hidden by default, toggled with JS) -->
        <div id="mobile-menu" class="hidden md:hidden mt-4">
            <a href="{{ url_for('home') }}" class="block py-2 px-4 text-lg hover:bg-yellow-500 hover:text-black">Home</a>
            <a href="{{ url_for('about') }}" class="block py-2 px-4 text-lg hover:bg-yellow-500 hover:text-black">About</a>
            <a href="{{ url_for('tokenomics') }}" class="block py-2 px-4 text-lg hover:bg-yellow-500 hover:text-black">Tokenomics</a>
            <a href="{{ url_for('how_to_buy') }}" class="block py-2 px-4 text-lg hover:bg-yellow-500 hover:text-black">How to Buy</a>
            <a href="{{ url_for('launch') }}" class="block py-2 px-4 text-lg hover:bg-yellow-500 hover:text-black">Launch</a>
            <a href="{{ url_for('community') }}" class="block py-2 px-4 text-lg hover:bg-yellow-500 hover:text-black">Community</a>
            <a href="{{ url_for('whitelist') }}" class="block py-2 px-4 text-lg hover:bg-yellow-500 hover:text-black">Whitelist</a>
            <a href="{{ url_for('memes') }}" class="block py-2 px-4 text-lg hover:bg-yellow-500 hover:text-black">Meme Gallery</a>
        </div>
    </nav>
    
    <main class="fade-in">
        {% block content %}{% endblock %}
    </main>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    
    <script>
        // Mobile menu toggle script
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('mobile-menu-button').addEventListener('click', function() {
                var mobileMenu = document.getElementById('mobile-menu');
                mobileMenu.classList.toggle('hidden');
            });
        });
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>
